<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;1,500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #faf9f7;
    color: #1a1714;
    font-family: 'EB Garamond', Georgia, serif;
    padding: 84px 96px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .kicker {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8a8178;
  }
  h1 { font-size: 84px; font-weight: 500; line-height: 1.05; letter-spacing: -0.01em; max-width: 760px; }
  .sub { font-style: italic; font-size: 30px; color: #57514b; margin-top: 18px; }
  .stats {
    font-family: 'DM Mono', monospace;
    font-size: 19px;
    letter-spacing: 0.04em;
    color: #b3aca3;
  }
  .stats b { color: #6b5526; font-weight: 400; }
  svg { position: absolute; right: 70px; top: 90px; }
</style>
</head>
<body>
  <!-- Influence-graph motif: circle (Philosophie) → diamond (Religion) → triangle (Geschichte) -->
  <svg width="380" height="450" viewBox="0 0 380 450" fill="none">
    <g stroke="#6b5526" stroke-width="2" opacity="0.55">
      <path d="M70 70 C 200 70, 120 200, 230 200"/>
      <path d="M230 200 C 330 200, 220 360, 300 360"/>
      <path d="M70 70 C 250 120, 180 380, 300 360"/>
      <path d="M230 200 C 180 250, 140 320, 110 300"/>
    </g>
    <circle cx="70" cy="70" r="22" fill="#3f5775"/>
    <path d="M230 175 L255 200 L230 225 L205 200 Z" fill="#3a5a48"/>
    <path d="M300 332 L323 372 L277 372 Z" fill="#6b5236"/>
    <circle cx="110" cy="300" r="14" fill="#3f5775" opacity="0.8"/>
  </svg>

  <p class="kicker">Ein interaktives Museum</p>
  <div>
    <h1>Philosophie, Religion &amp; Geschichte</h1>
    <p class="sub">Welche Ideen welche Ideen auslösten — über 2.500 Jahre.</p>
  </div>
  <p class="stats"><b>39</b> Exponate &nbsp;·&nbsp; <b>5</b> Räume &nbsp;·&nbsp; <b>73</b> Einflusskanten &nbsp;·&nbsp; ca. 530 v.&nbsp;Chr. – 2009 n.&nbsp;Chr.</p>
</body>
</html>
