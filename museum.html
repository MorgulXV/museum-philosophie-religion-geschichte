<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faith &amp; Reason — 3D Museum</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
  <style>
    /* ── Design tokens (mirrored from styles.css) ──────────────────────── */
    :root {
      --color-bg:             #F8F6F2;
      --color-surface:        #F0EDE7;
      --color-border:         #D8D4CB;
      --color-border-strong:  #B8B3A8;
      --color-text-primary:   #1C1A16;
      --color-text-secondary: #5C5A55;
      --color-text-muted:     #96938D;
      --color-accent:         #C87941;
      --font-serif: Georgia, 'Palatino Linotype', serif;
      --font-sans:  'Helvetica Neue', Arial, system-ui, sans-serif;
    }

    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0C0B09;
    }

    /* ── Canvas ────────────────────────────────────────────────────────── */
    #museum-canvas { display: block; width: 100%; height: 100%; }

    /* ── Back link — 3D → 2D switcher ─────────────────────────────────── */
    #back-link {
      position: fixed;
      top: 1rem; left: 1.25rem;
      z-index: 30;
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(248, 246, 242, 0.85);
      text-decoration: none;
      border: 1px solid rgba(248, 246, 242, 0.35);
      padding: 0.3rem 0.75rem;
      transition: color 0.15s, border-color 0.15s, background-color 0.15s;
    }
    #back-link:hover {
      color: #F8F6F2;
      border-color: rgba(248, 246, 242, 0.7);
      background-color: rgba(248, 246, 242, 0.06);
    }
    #back-link:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
    }

    /* ── Loading overlay ───────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #loading-overlay[hidden] { display: none !important; }

    .spinner {
      width: 2rem;
      height: 2rem;
      border: 2px solid rgba(184, 179, 168, 0.18);
      border-top-color: rgba(184, 179, 168, 0.75);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Exhibit panel ─────────────────────────────────────────────────── */
    #exhibit-panel {
      position: fixed;
      right: 1.5rem;
      top: 50%;
      transform: translateY(calc(-50% + 0.75rem));
      width: min(22rem, calc(100vw - 3rem));
      max-height: calc(100dvh - 5rem);
      overflow-y: auto;
      background: var(--color-bg);
      border: 1px solid var(--color-border-strong);
      padding: 2rem 1.75rem 1.75rem;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    #exhibit-panel.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%);
    }

    /* Mobile: bottom sheet — bottom-padded to clear the room-nav bar */
    @media (max-width: 640px) {
      #exhibit-panel {
        right: 0; left: 0; top: auto; bottom: 0;
        width: 100%;
        max-height: 56dvh;
        transform: translateY(1rem);
        border-top: 1px solid var(--color-border-strong);
        border-right: none; border-left: none; border-bottom: none;
        padding-bottom: 4.5rem; /* clears room-nav (≈ 3rem tall + 1.5rem gap) */
      }
      #exhibit-panel.visible { transform: translateY(0); }
    }

    /* Panel close button */
    #panel-close {
      position: absolute;
      top: 0.875rem; right: 0.875rem;
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 1rem;
      color: var(--color-text-muted);
      padding: 0.125rem 0.5rem;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s;
    }
    #panel-close:hover  { color: var(--color-text-primary); border-color: var(--color-border); }
    #panel-close:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

    /* Panel content */
    #panel-tagline {
      font-family: var(--font-sans);
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 0.625rem;
    }
    #panel-title {
      font-family: var(--font-serif);
      font-size: 1.375rem;
      font-weight: normal;
      line-height: 1.25;
      color: var(--color-text-primary);
      margin-bottom: 1rem;
      padding-right: 1.5rem;
    }
    #panel-key-idea {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-style: italic;
      line-height: 1.6;
      color: var(--color-text-secondary);
      border-left: 3px solid var(--color-accent);
      padding-left: 0.875rem;
      margin-bottom: 1.25rem;
    }
    #panel-quote {
      border: 1px solid var(--color-border);
      padding: 0.875rem 1rem;
      background: var(--color-surface);
      margin-bottom: 1rem;
    }
    #panel-quote-text {
      font-family: var(--font-serif);
      font-size: 0.9375rem;
      font-style: italic;
      line-height: 1.65;
      color: var(--color-text-primary);
      margin-bottom: 0.5rem;
    }
    #panel-quote-attr {
      font-family: var(--font-sans);
      font-size: 0.6875rem;
      letter-spacing: 0.03em;
      color: var(--color-text-muted);
    }
    #panel-disputed[hidden] { display: none !important; }
    #panel-disputed {
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      padding: 0.125rem 0.5rem;
    }

    /* ── Room navigation bar ───────────────────────────────────────────── */
    #room-nav {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 0.875rem;
      background: rgba(12, 11, 9, 0.75);
      border: 1px solid rgba(184, 179, 168, 0.22);
      padding: 0.5rem 0.875rem;
    }

    .room-nav-btn {
      background: none;
      border: 1px solid rgba(184, 179, 168, 0.32);
      color: rgba(248, 246, 242, 0.65);
      font-family: var(--font-sans);
      font-size: 1rem;
      padding: 0.2rem 0.7rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s;
    }
    .room-nav-btn:hover:not(:disabled) {
      color: #F8F6F2;
      border-color: rgba(184, 179, 168, 0.6);
    }
    .room-nav-btn:disabled {
      opacity: 0.28;
      cursor: default;
    }
    .room-nav-btn:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    #room-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 8.5rem;
      gap: 0.1rem;
    }

    #room-counter {
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(150, 147, 141, 0.75);
    }

    #room-title {
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: rgba(248, 246, 242, 0.82);
    }
  </style>
</head>
<body>

  <!-- 3D → 2D switcher -->
  <a id="back-link" href="index.html">← Klassische Ansicht</a>

  <canvas id="museum-canvas" aria-label="3D-Museumsraum — Artefakt antippen zum Lesen"></canvas>

  <!-- Loading spinner — visible while GLB models are in flight -->
  <div id="loading-overlay" hidden aria-hidden="true">
    <div class="spinner"></div>
  </div>

  <!-- Exhibit detail panel -->
  <aside id="exhibit-panel" aria-live="polite" aria-hidden="true">
    <button id="panel-close" aria-label="Schließen">&#x2715;</button>
    <p id="panel-tagline"></p>
    <h2 id="panel-title"></h2>
    <p id="panel-key-idea"></p>
    <blockquote id="panel-quote">
      <p id="panel-quote-text"></p>
      <footer id="panel-quote-attr"></footer>
    </blockquote>
    <span id="panel-disputed" hidden>(attribution disputed)</span>
  </aside>

  <!-- Room navigation — prev/next + "Raum X von 5" -->
  <nav id="room-nav" aria-label="Raumnavigation">
    <button id="btn-prev" class="room-nav-btn" aria-label="Voriger Raum" disabled>&#8592;</button>
    <div id="room-info" aria-live="polite">
      <span id="room-counter">Raum 3 von 5</span>
      <span id="room-title">III. The Break</span>
    </div>
    <button id="btn-next" class="room-nav-btn" aria-label="Nächster Raum">&#8594;</button>
  </nav>

  <script type="module" src="museum.js"></script>
</body>
</html>
